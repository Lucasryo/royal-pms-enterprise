name: Deploy Supabase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set VAPID secrets on Supabase functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }} \
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }} \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy edge function — public-rates-calendar
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for i in 1 2 3; do
            if supabase functions deploy public-rates-calendar \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt; then
              break
            fi
            echo "Retry $i failed, waiting 10s..."
            sleep 10
          done

      - name: Deploy edge function — public-rates-quote
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for i in 1 2 3; do
            if supabase functions deploy public-rates-quote \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt; then
              break
            fi
            echo "Retry $i failed, waiting 10s..."
            sleep 10
          done

      - name: Deploy edge function — public-booking-request
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for i in 1 2 3; do
            if supabase functions deploy public-booking-request \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt; then
              break
            fi
            echo "Retry $i failed, waiting 10s..."
            sleep 10
          done

      - name: Deploy edge function — send-push-notification
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for i in 1 2 3; do
            if supabase functions deploy send-push-notification \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt; then
              break
            fi
            echo "Retry $i failed, waiting 10s..."
            sleep 10
          done

      - name: Run SQL migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- <<'SQL'
          {
            "query": "create table if not exists public.booking_blocked_dates (id uuid default gen_random_uuid() primary key, category text check (category is null or category in ('executivo','master','suite presidencial')), start_date date not null, end_date date not null, reason text, active boolean not null default true, created_by uuid references auth.users(id), created_at timestamptz not null default timezone('utc',now()), updated_at timestamptz not null default timezone('utc',now()), check (end_date >= start_date)); create index if not exists idx_booking_blocked_dates_active on public.booking_blocked_dates(active,category,start_date,end_date); alter table if exists public.booking_blocked_dates enable row level security; do $$ begin if not exists (select 1 from pg_policies where tablename='booking_blocked_dates' and policyname='booking_blocked_dates_select_staff') then create policy booking_blocked_dates_select_staff on public.booking_blocked_dates for select to authenticated using (exists (select 1 from public.profiles where id = auth.uid() and role in ('admin','reservations','manager'))); end if; if not exists (select 1 from pg_policies where tablename='booking_blocked_dates' and policyname='booking_blocked_dates_manage_staff') then create policy booking_blocked_dates_manage_staff on public.booking_blocked_dates for all to authenticated using (exists (select 1 from public.profiles where id = auth.uid() and role in ('admin','reservations','manager'))) with check (exists (select 1 from public.profiles where id = auth.uid() and role in ('admin','reservations','manager'))); end if; end $$; create table if not exists public.push_subscriptions (id uuid default gen_random_uuid() primary key, user_id uuid references auth.users(id) on delete cascade not null, endpoint text not null, subscription jsonb not null, created_at timestamptz not null default timezone('utc',now()), updated_at timestamptz not null default timezone('utc',now()), unique(user_id,endpoint)); create index if not exists idx_push_subscriptions_user on public.push_subscriptions(user_id); alter table if exists public.push_subscriptions enable row level security; do $$ begin if not exists (select 1 from pg_policies where tablename='push_subscriptions' and policyname='push_subscriptions_own') then create policy push_subscriptions_own on public.push_subscriptions for all to authenticated using (auth.uid()=user_id) with check (auth.uid()=user_id); end if; end $$;"
          }
          SQL

      - name: Run event items migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- <<'SQL'
          {
            "query": "create table if not exists public.event_items (id uuid default gen_random_uuid() primary key, name text not null, description text, unit text not null default 'por_unidade', default_price numeric(12,2) not null default 0, category text, active boolean not null default true, created_at timestamptz default timezone('utc', now()) not null, created_by uuid references auth.users(id)); create index if not exists idx_event_items_active on public.event_items(active, name); alter table public.hotel_events add column if not exists halls text[] default '{}'; alter table public.hotel_events add column if not exists pricing_model text default 'fixed'; alter table public.hotel_events add column if not exists quote_items jsonb default '[]'; alter table public.hotel_events add column if not exists subtotal_value numeric(12,2) default 0; alter table public.hotel_events add column if not exists iss_enabled boolean default false; alter table public.hotel_events add column if not exists iss_rate numeric(5,2) default 5.0; alter table public.hotel_events add column if not exists iss_amount numeric(12,2) default 0; alter table public.hotel_events add column if not exists hall_price numeric(12,2) default 0; alter table public.hotel_events add column if not exists is_quote boolean default false; alter table public.hotel_events add column if not exists quote_number text; alter table public.event_items enable row level security; do $$ begin if not exists (select 1 from pg_policies where tablename='event_items' and policyname='event_items_select_staff') then create policy event_items_select_staff on public.event_items for select using (exists (select 1 from public.profiles where id = auth.uid())); end if; if not exists (select 1 from pg_policies where tablename='event_items' and policyname='event_items_manage_events') then create policy event_items_manage_events on public.event_items for all using (exists (select 1 from public.profiles where id = auth.uid() and role in ('admin','manager','eventos'))) with check (exists (select 1 from public.profiles where id = auth.uid() and role in ('admin','manager','eventos'))); end if; end $$;"
          }
          SQL

      - name: Deploy edge function — notify-maintenance-ticket
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for i in 1 2 3; do
            if supabase functions deploy notify-maintenance-ticket \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt; then
              break
            fi
            echo "Retry $i failed, waiting 10s..."
            sleep 10
          done

      - name: Set Telegram secrets on Edge Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true
        run: |
          supabase secrets set \
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} \
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }} \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Register Telegram webhook
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/notify-maintenance-ticket\"}" \
            | cat

      - name: Run maintenance tickets RLS migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- <<'SQLEOF'
          {
            "query": "do $$ begin if not exists (select 1 from pg_policies where tablename='maintenance_tickets' and policyname='authenticated_can_view_all_tickets') then create policy \"authenticated_can_view_all_tickets\" on public.maintenance_tickets for select to authenticated using (true); end if; if not exists (select 1 from pg_policies where tablename='maintenance_tickets' and policyname='authenticated_can_update_tickets') then create policy \"authenticated_can_update_tickets\" on public.maintenance_tickets for update to authenticated using (true) with check (true); end if; end $$;"
          }
          SQLEOF

      - name: Add rating and inspection columns to maintenance_tickets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- <<'SQLEOF'
          {
            "query": "alter table public.maintenance_tickets add column if not exists rating int check (rating is null or (rating >= 1 and rating <= 5)); alter table public.maintenance_tickets add column if not exists inspection_status text check (inspection_status is null or inspection_status in ('pending','approved','rejected')); alter table public.maintenance_tickets add column if not exists inspector_id uuid references auth.users(id); alter table public.maintenance_tickets add column if not exists inspection_notes text; alter table public.maintenance_tickets add column if not exists inspected_at timestamptz;"
          }
          SQLEOF
