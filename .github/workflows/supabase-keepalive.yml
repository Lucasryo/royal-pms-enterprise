name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 10 */5 * *"   # A cada 5 dias às 10:00 UTC — limite Supabase free é 7 dias
  workflow_dispatch:           # Permite rodar manualmente

jobs:
  keepalive:
    name: Ping Supabase → evitar pausa por inatividade
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping REST API do Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Pinging Supabase em $(date '+%d/%m/%Y %H:%M UTC')..."

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1")

          echo "HTTP Status: ${HTTP_STATUS}"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Supabase ativo — projeto não será pausado."
          else
            echo "❌ Resposta inesperada: ${HTTP_STATUS}"
            exit 1
          fi
